<!DOCTYPE html> 
<head>
    <title>First Form Project</title>
</head>
<body>
    <form>
    <fieldset>
        <h1>Personal Information</h1>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="userFirstName">
        <br><br>
        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="userLastName">
        <br><br>

        <label>Gender</label>
        <br>
        <input type="radio" id="maleG" name="gender" value="Male">Male
        <br>
        <input type="radio" id="femaleG" name="gender" value="Female">Female
        <br>
        <label>Language used for web development</label>
        <input type="checkbox" id="favlang" name="favlang" value="HTML">HTML
        <input type="checkbox" id="favlang2" name="favlang" value="CSS">CSS
        <input type="checkbox" id="favlang3" name="favlang" value="JS">JS 
        <br><br>
        <label for="religionSel">Select your relegion</label>
        <select name="userreligion" id="religionSel">
            <option value="Islam">Islam</option>
            <option value="Christianity">Christianity</option>
            <option value="Hinduism">Hinduism</option>
            <option value="Buddhism">Buddhism</option>
        </select>


    </fieldset>
    <br><br>
    <input type="submit" value="Submit">
    </form>
</body>
